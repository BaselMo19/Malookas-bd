<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Countdown 💗</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* 💗 Countdown Screen */
#countdownContainer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1s ease;
    color: white;
}

#countdown {
    font-size: 70px;
    font-weight: bold;
}

/* 🎬 Video Screen */
#videoContainer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: opacity 1.5s ease;
}

#videoContainer.show {
    opacity: 1;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* 🔊 Button */
#unmuteBtn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 22px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: rgba(255,255,255,0.9);
    cursor: pointer;
}

/* 🎉 Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

/* 💖 Hearts */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="countdownContainer">
    <div id="countdown">Loading...</div>
</div>

<div id="videoContainer">
    <video id="celebrationVideo" loop>
        <source src="maloookasssbd.mp4" type="video/mp4">
    </video>

    <button id="unmuteBtn">Tap for Sound ❤️</button>
</div>

<script>
function getMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setDate(now.getDate() + 1);
    midnight.setHours(0, 0, 0, 0);
    return midnight;
}

function startCelebration() {
    // 🎉 Confetti
    for (let i = 0; i < 100; i++) {
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration = (Math.random()*3 + 2) + "s";
        document.body.appendChild(confetti);
    }

    // 💖 Hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random()*20 + 15) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }, 300);
}

function updateCountdown() {
    const now = new Date().getTime();
    const midnight = getMidnight().getTime();
    const distance = midnight - now;

    if (true) {
        const countdownContainer = document.getElementById("countdownContainer");
        const videoContainer = document.getElementById("videoContainer");
        const video = document.getElementById("celebrationVideo");

        countdownContainer.style.opacity = "0";

        setTimeout(() => {
            countdownContainer.style.display = "none";
            videoContainer.classList.add("show");

            video.play().catch(()=>{});

            startCelebration(); // 🎉 start effects
        }, 1000);

        clearInterval(timer);
        return;
    }

    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        hours + "h " + minutes + "m " + seconds + "s";
}

const timer = setInterval(updateCountdown, 1000);
updateCountdown();

/* 🔊 Sound button */
const btn = document.getElementById("unmuteBtn");
const video = document.getElementById("celebrationVideo");

btn.addEventListener("click", () => {
    video.muted = false;
    video.play();
    btn.style.display = "none";
});
</script>

</body>
</html>
