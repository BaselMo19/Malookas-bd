<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown to Midnight</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* Countdown screen */
#countdownContainer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac); /* PINK 💗 */
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1s ease;
}

#countdown {
    font-size: 70px;
    font-weight: bold;
}

/* Video screen */
#videoContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    opacity: 0;
    transition: opacity 1.5s ease;
}

#videoContainer.show {
    opacity: 1;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* FIXED: no weird zoom */
    background: black;
}
</style>
</head>

<body>

<div id="countdownContainer">
    <div id="countdown">Loading...</div>
</div>

<div id="videoContainer">
    <video id="celebrationVideo" muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
</div>

<script>
function getMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setDate(now.getDate() + 1);
    midnight.setHours(0, 0, 0, 0);
    return midnight;
}

function updateCountdown() {
    const now = new Date().getTime();
    const midnight = getMidnight().getTime();
    const distance = midnight - now;

    if (distance <= 0) {
        const countdownContainer = document.getElementById("countdownContainer");
        const videoContainer = document.getElementById("videoContainer");
        const video = document.getElementById("celebrationVideo");

        // Fade out countdown
        countdownContainer.style.opacity = "0";

        setTimeout(() => {
            countdownContainer.style.display = "none";

            // Show video smoothly
            videoContainer.classList.add("show");

            video.play().catch(() => {
                console.log("Autoplay blocked");
            });

        }, 1000);

        clearInterval(timer);
        return;
    }

    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        hours + "h " + minutes + "m " + seconds + "s";
}

const timer = setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
