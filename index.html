<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown to Midnight</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        text-align: center;
    }

    #countdown {
        font-size: 60px;
    }

    #videoContainer {
        display: none;
        width: 100%;
        height: 100%;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>
</head>
<body>

<div id="countdown">Loading...</div>

<div id="videoContainer">
    <video id="celebrationVideo" autoplay muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</div>

<script>
function getMidnight() {
    const now = new Date();
    const midnight = new Date();

    midnight.setHours(24, 0, 0, 0); // next 12 AM
    return midnight;
}

function updateCountdown() {
    const now = new Date().getTime();
    const midnight = getMidnight().getTime();
    const distance = midnight - now;

    if (distance <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("videoContainer").style.display = "block";

        const video = document.getElementById("celebrationVideo");
        video.play();

        clearInterval(timer);
        return;
    }

    const hours = Math.floor((distance / (1000 * 60 * 60)));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        hours + "h " + minutes + "m " + seconds + "s";
}

const timer = setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
